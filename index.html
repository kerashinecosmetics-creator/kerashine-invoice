<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Kerashine Invoice</title>

<style>

/* RESET */
body {
    margin:0;
    background:#e5e5e5;
    font-family: Arial;
}

/* CONTROLS */
.controls {
    padding:20px;
    background:white;
    max-width:500px;
    margin:auto;
}

.controls input,
.controls select {
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

.controls button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#9f4d58;
    color:white;
    font-size:15px;
}

/* INVOICE */
.invoice {
    width:190mm;
    min-height:297mm;
    margin:auto;
    background:white;
    padding:25mm 18mm;
    box-sizing:border-box;
    position:relative;
}

/* HEADER */
.header img {
    width:100%;
    margin-bottom:25px;
}

/* TOP */
.top {
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
}

.left {
    width:60%;
    font-size:14px;
    line-height:1.6;
}

.right {
    width:35%;
    text-align:right;
    font-size:14px;
}

/* TABLE */
table {
    width:100%;
    border-spacing:0 14px;
}

th {
    background:#9f4d58;
    color:white;
    padding:14px;
    text-align:center;
}

td {
    background:#f3f3f3;
    padding:14px;
}

td:nth-child(1) { text-align:center; }
td:nth-child(3),
td:nth-child(4) { text-align:right; }

/* TERMS + SUMMARY */
.row2 {
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

.terms {
    width:50%;
    font-size:12px;
}

.summary {
    width:280px;
    font-size:13px;
}

.summary div {
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}

.highlight {
    color:#9f4d58;
    font-weight:bold;
}

/* FOOTER */
.footer {
    position:absolute;
    bottom:25mm;
    left:18mm;
    width:calc(100% - 36mm);
}

.footer img {
    width:100%;
}

.footer-text {
    position:absolute;
    bottom:8mm;
    width:100%;
    text-align:center;
    font-size:11px;
}

/* PRINT */
@media print {
    .controls { display:none; }
    body { background:white; }
}

.autocomplete-box {
    position:relative;
}

.suggestions {
    position:absolute;
    width:90%;
    background:white;
    border:1px solid #ddd;
    border-top:none;
    max-height:150px;
    overflow-y:auto;
    z-index:1000;
    border-radius:0 0 8px 8px;
}

.suggestions div {
    padding:10px;
    cursor:pointer;
    font-size:14px;
}

.suggestions div:hover {
    background:#f5f5f5;
}

.invoice {
    page-break-inside: avoid;
}

table {
    page-break-inside: avoid;
}

</style>
</head>

<body>

<div class="controls">
    <div class="autocomplete-box">
        <input id="customerName" placeholder="Customer Name" oninput="searchCustomer()">
        <div id="suggestions" class="suggestions"></div>
    </div>
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">
    <input id="paidInput" placeholder="Amount Paid">

    <table><tbody id="items"></tbody></table>

    <button onclick="addItem()">+ Add Item</button>
    <button onclick="downloadPDF()">Download Invoice</button>
</div>

<div class="invoice" id="invoice" style="display:none;">

    <div class="header">
        <img src="header.png">
    </div>

    <div class="top">
        <div class="left">
            <b>Issued to:</b> <span id="pname"></span><br>
            <span id="pphone"></span><br>
            <span id="paddress"></span>
        </div>

        <div class="right">
            <div><b>Number:</b> <span id="inv"></span></div>
            <div><b>Date:</b> <span id="date"></span></div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>QTY</th>
                <th>DESCRIPTION</th>
                <th>PRICE</th>
                <th>TOTAL</th>
            </tr>
        </thead>
        <tbody id="data"></tbody>
    </table>

    <div class="row2">
        <div class="terms">
            <b style="color:#9f4d58;">PAYMENT TERMS</b>
            <ul>
                <li>Payment within 15 days</li>
                <li>Bank transfer or COD</li>
                <li>No claims after delivery</li>
            </ul>
        </div>

        <div class="summary">
            <div><span>Sub total</span><span id="sub"></span></div>
            <div><span>Discount</span><span>Rs. 0/-</span></div>
            <div class="highlight"><span>TOTAL</span><span id="totalprint"></span></div>
            <div><span>Amount Paid</span><span id="paidprint"></span></div>
            <div class="highlight"><span>Balance</span><span id="balance"></span></div>
        </div>
    </div>

    <div class="footer">
        <img src="footer.png">
    </div>

    <div class="footer-text">
        KERASHINE – Pakistan – +92 326 8681026 <br>
        kerashinecosmetics@gmail.com
    </div>

</div>

<script>

const products = {
    "Shampoo 500ml":1200,
    "Shampoo 250ml":800,
    "Conditioner 500ml":1200,
    "Conditioner 250ml":800,
    "Hair Mask 500ml":1200,
    "Hair Mask 300ml":500,
    "Serum 60ml":400
};

const customers = [
    { name:"SEEMA SALON", phone:"+92 320 0217795", address:"North Nazimabad Karachi" },
    { name:"Maria Ali Shah", phone:"+92 311 2288016", address:"Shadman 14B" },
    { name:"NAZIA SHAKEEL SALON", phone:"+92 323 2353094", address:"Block H North Nazimabad" },
    { name:"BEENA BEAUTY SALON", phone:"+92 314 8150328", address:"New Karachi Town" },
    { name:"NOOR STUDIO", phone:"+92 321 2927073", address:"Soldier Bazaar" },
    { name:"Nargis Taqi Salon and Spa", phone:"+92 332 0007996", address:"DHA Phase 6" },
    { name:"11 ELEVEN", phone:"+92 326 2114730", address:"Bukhari Commercial" }
];

function addItem(){
    let row = document.createElement("tr");

    row.innerHTML = `
        <td><input type="number" class="qty" value="1"></td>
        <td>
            <select class="desc">
                ${Object.keys(products).map(p=>`<option>${p}</option>`).join("")}
            </select>
        </td>
        <td><input type="number" class="price" value="1200"></td>
    `;

    let select = row.querySelector(".desc");
    let priceInput = row.querySelector(".price");

    select.addEventListener("change", function(){
        priceInput.value = products[this.value];
    });

    priceInput.value = products[select.value];

    items.appendChild(row);
}

addItem();

function format(v){
    return "Rs. " + v.toLocaleString() + "/-";
}

function generate(){

    pname.innerText = customerName.value;
    pphone.innerText = phone.value;
    paddress.innerText = address.value;

    inv.innerText = Math.floor(10 + Math.random() * 90);

    let d = new Date();
    date.innerText = d.toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric"
    });

    let total = 0;
    let html = "";

    document.querySelectorAll("#items tr").forEach(r=>{
        let q = +r.querySelector(".qty").value;
        let d = r.querySelector(".desc").value;
        let p = +r.querySelector(".price").value;

        let t = q*p;
        total += t;

        html += `<tr>
            <td>${q}</td>
            <td>${d}</td>
            <td>${format(p)}</td>
            <td>${format(t)}</td>
        </tr>`;
    });

    data.innerHTML = html;

    let paidVal = +paidInput.value || 0;

    sub.innerText = format(total);
    totalprint.innerText = format(total);
    paidprint.innerText = format(paidVal);
    balance.innerText = format(total - paidVal);
}

function downloadPDF(){
    generate();

    const element = document.getElementById("invoice");
    element.style.display = "block";

    html2pdf().set({
        margin:0,
        filename:'Kerashine_Invoice.pdf',
        html2canvas:{scale:2},
        jsPDF:{unit:'mm', format:'a4'}
    }).from(element).save().then(()=>{
        element.style.display = "none";
    });
}

function searchCustomer(){
    let input = customerName.value.toLowerCase();
    let box = document.getElementById("suggestions");

    box.innerHTML = "";

    if(!input){
    box.innerHTML = "";
    return;
}

    let filtered = customers
    .filter(c => c.name.toLowerCase().includes(input))
    .sort((a,b)=> a.name.indexOf(input) - b.name.indexOf(input));

    filtered.forEach(c=>{
        let div = document.createElement("div");
        div.innerText = c.name;

        div.onclick = function(){
            customerName.value = c.name;
            phone.value = c.phone;
            address.value = c.address;
            box.innerHTML = "";
        };

        box.appendChild(div);
    });
}

document.addEventListener("click", function(e){
    if(!e.target.closest(".autocomplete-box")){
        document.getElementById("suggestions").innerHTML = "";
    }
});

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
